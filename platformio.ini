; =============================================================
; Project Flour - IoT Smart Planter (Flaura)
; PlatformIO Configuration 
; MCU: ESP32 38-Pin DevKit V1
; =============================================================

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; --- Serial Monitor ---
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize
monitor_port    = COM11

; --- Upload / Flash Settings (esptool, UTF-8) ---
upload_speed    = 460800
upload_port     = COM11
upload_protocol = esptool

; --- Partition Scheme ---
board_build.partitions = min_spiffs.csv
lib_ldf_mode = deep

; --- Libraries ---
lib_deps =
    FS
    SPI
    WiFi
    ; TFT Display Driver (ST7735)
    bodmer/TFT_eSPI @ ^2.5.43

    ; Blynk IoT Platform
    blynkkk/Blynk @ ^1.3.2

    ; HC-SR04 Ultrasonic Sensor
    martinsos/HCSR04 @ ^2.0.0

    ; ArduinoJson (WebSocket JSON serialization)
    bblanchon/ArduinoJson @ ^7.1.0

    ; ESPAsyncWebServer (WebSocket server for mobile app)
    mathieucarbou/ESPAsyncWebServer @ ^3.3.17
    mathieucarbou/AsyncTCP @ ^3.2.14

    ; NTP Time Client
    arduino-libraries/NTPClient @ ^3.2.1

; --- Build Flags (single merged section) ---
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DBLYNK_PRINT=Serial
    -DBLYNK_NO_BUILTIN
    -DBLYNK_NO_FANCY_LOGO
    -finput-charset=UTF-8
    -fexec-charset=UTF-8
    -std=gnu++17
    ; ---- ST7735 Driver Selection ----
    -DUSER_SETUP_LOADED=1
    -DST7735_DRIVER=1
    -DTFT_WIDTH=128
    -DTFT_HEIGHT=160
    -DST7735_BLACKTAB
    -DTFT_RGB_ORDER=TFT_RGB
    ; ---- SPI Pin Mapping (38-Pin ESP32) ----
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=22
    -DTFT_RST=4
    -DTFT_BL=21
    -DTFT_MISO=-1
    ; ---- SPI Frequency ----
    -DSPI_FREQUENCY=10000000
    -DSPI_READ_FREQUENCY=5000000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
